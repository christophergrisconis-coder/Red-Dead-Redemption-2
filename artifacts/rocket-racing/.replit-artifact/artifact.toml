kind = "web"
previewPath = "/rocket-racing/"
title = "Rocket Racing Guide"
version = "1.0.0"
id = "artifacts/rocket-racing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/rocket-racing/" ]
localPort = 24057

[services.development]
run = "pnpm --filter @workspace/rocket-racing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rocket-racing", "run", "build" ]
publicDir = "artifacts/rocket-racing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24057"
BASE_PATH = "/rocket-racing/"
