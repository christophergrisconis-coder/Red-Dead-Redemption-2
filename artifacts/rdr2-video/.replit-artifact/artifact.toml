kind = "video"
previewPath = "/rdr2-video/"
title = "RDR2 Guide Promo Video"
version = "1.0.0"
id = "artifacts/rdr2-video"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/rdr2-video/" ]
localPort = 24774

[services.development]
run = "pnpm --filter @workspace/rdr2-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rdr2-video", "run", "build" ]
publicDir = "artifacts/rdr2-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24774"
BASE_PATH = "/rdr2-video/"
